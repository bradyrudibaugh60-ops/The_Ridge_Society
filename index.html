<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>The Ridge Society</title>

<link rel="stylesheet" href="css/style.css">

<link rel="icon"
href="assets/ui/favicon.png">

</head>

<body>

<!-- ============================= -->
<!-- Background -->
<!-- ============================= -->

<div id="background"></div>

<!-- ============================= -->
<!-- Fog Overlay -->
<!-- ============================= -->

<div id="fog"></div>

<!-- ============================= -->
<!-- Main Menu -->
<!-- ============================= -->

<div id="mainMenu">

    <h1 id="title">
        THE RIDGE SOCIETY
    </h1>

    <p id="version">
        Version 1.0.0
    </p>

    <div id="menuButtons">

        <button id="newGame">
            NEW GAME
        </button>

        <button id="continueGame">
            CONTINUE
        </button>

        <button id="episodes">
            EPISODES
        </button>

        <button id="settings">
            SETTINGS
        </button>

        <button id="credits">
            CREDITS
        </button>

    </div>

</div>

<!-- ============================= -->
<!-- Loading Screen -->
<!-- ============================= -->

<div id="loadingScreen">

    <h2>Loading...</h2>

</div>

<!-- ============================= -->
<!-- Fade Overlay -->
<!-- ============================= -->

<div id="fade"></div>

<!-- ============================= -->
<!-- Audio -->
<!-- ============================= -->

<audio
id="menuMusic"
loop>

<source
src="assets/audio/menu.mp3"
type="audio/mpeg">

</audio>

<!-- ============================= -->
<!-- Scripts -->
<!-- ============================= -->

<script src="js/main.js"></script>

</body>

</html>
